services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrbitalAcademy: Host=postgres;Port=5432;Database=orbital_academy;Username=TODO_DB_USER;Password=TODO_DB_PASSWORD
      Authentication__JwtBearer__Enabled: "false"
      Authentication__JwtBearer__Issuer: orbital-academy
      Authentication__JwtBearer__Audience: orbital-academy-api
      Authentication__JwtBearer__Secret: TODO_SECRET_COM_TAMANHO_SEGURO
      Authentication__JwtBearer__AccessTokenMinutes: "60"
      Authentication__InitialUser__Enabled: "false"
      Authentication__InitialUser__Email: TODO_EMAIL_DEMO
      Authentication__InitialUser__Nome: TODO_NOME_DEMO
      Authentication__InitialUser__Papel: operador
      Authentication__InitialUser__Unidade: TODO_UNIDADE_DEMO
      Authentication__InitialUser__Password: TODO_SENHA_DEMO_NAO_VERSIONAR
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: orbital_academy
      PGUSER: TODO_DB_USER
      PGPASSWORD: TODO_DB_PASSWORD
      Security__Backup__ScriptPath: scripts/backup-db.sh
      Security__Backup__BackupDirectory: /backups
      Security__Backup__LogFilePath: /backups/logs/backup.log
      Security__Backup__MaxLogLines: "100"
      Security__Backup__TimeoutSeconds: "120"
      Cors__AllowedOrigins__0: http://localhost:19006
      Cors__AllowedOrigins__1: http://localhost:3000
      Cors__AllowedOrigins__2: http://localhost:5173
      Cors__AllowedOrigins__3: http://localhost:8081
    ports:
      - "5048:8080"
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: orbital_academy
      POSTGRES_USER: TODO_DB_USER
      POSTGRES_PASSWORD: TODO_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - orbital-academy-postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TODO_DB_USER -d orbital_academy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orbital-academy-postgres-18-data:
